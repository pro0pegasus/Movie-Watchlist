<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Movie Watchlist</title>
        
        <link rel="stylesheet" href="index.css">
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        
        <script src="https://kit.fontawesome.com/e91b5e6bd8.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <main>
            <div class="header-text">
                <h1>Find your film</h1>
                <p>My Watchlist</p>
            </div>
            
            <div class="input-container">
                <i class="fa-brands fa-sistrix"></i>
                <input id="input-data" type="text" placeholder="Search for a film" />
                <button id="search-btn">Search</button>
            </div>
            
            <section>
                        <!-- class= icon-container -->
                <div class="icon-container hidden">
                    <i class="fa-solid fa-film fa-4xl"></i>
                    <p>Start exploring</p>
                </div>
                
            </section>
            
        </main>

        <script src="index.js"></script>
    </body>
</html>
